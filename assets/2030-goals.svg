<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" role="img">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1a2e"/>
      <stop offset="1" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
