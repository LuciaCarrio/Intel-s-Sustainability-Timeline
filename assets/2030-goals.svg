    </filter>
    <style>
      .panel{fill:url(#bg);stroke:rgba(255,255,255,.18);stroke-width:2}.line{fill:none;stroke:url(#blue);stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:rgba(255,255,255,.26);stroke-width:2;stroke-linecap:round}.soft{fill:rgba(255,255,255,.07);stroke:rgba(255,255,255,.18);stroke-width:2}.dot{fill:#66f2b1;filter:url(#glow)}.bluefill{fill:#00a3ff}.greenfill{fill:#66f2b1}.text{font:700 30px system-ui,Segoe UI,sans-serif;fill:rgba(255,255,255,.78);letter-spacing:2px}.num{font:900 62px system-ui,Segoe UI,sans-serif;fill:#00a3ff;letter-spacing:-4px}
    </style>
  </defs>
